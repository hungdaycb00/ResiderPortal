<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Alin.city</title>
    <script>
      (function() {
        var RECOVERY_KEY = 'last_asset_reload';
        var COOLDOWN_MS = 10000;
        var BUILD_VERSION_KEY = 'APP_BUILD_VERSION';
        var PRESERVED_KEYS = ['cloudflareUrl', 'deviceId', 'accessToken', 'user'];

        // === PROACTIVE VERSION CHECK ===
        // Runs before any JS loads. Uses TWO detection mechanisms:
        // 1. Compare meta build-version against localStorage (fast path)
        // 2. Poll /version.txt from network with cache bypass (catches stale HTML)
        (function checkBuildVersion() {
          try {
            var metaVersion = document.querySelector('meta[name="build-version"]');
            var htmlVersion = metaVersion ? metaVersion.getAttribute('content') : null;

            function nuclearClear(newVersion) {
              // Preserve critical auth data
              var preserved = {};
              PRESERVED_KEYS.forEach(function(k) {
                var v = localStorage.getItem(k);
                if (v !== null) preserved[k] = v;
              });

              localStorage.clear();
              sessionStorage.clear();

              Object.keys(preserved).forEach(function(k) {
                localStorage.setItem(k, preserved[k]);
              });
              localStorage.setItem(BUILD_VERSION_KEY, newVersion || htmlVersion || '');

              // Clear Service Workers
              if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                  regs.forEach(function(r) { r.unregister(); });
                }).catch(function() {});
              }

              // Clear Cache Storage
              if ('caches' in window) {
                caches.keys().then(function(keys) {
                  keys.forEach(function(key) {
                    if (/asset|vite|workbox|game|alin|resider/i.test(key)) {
                      caches.delete(key);
                    }
                  });
                }).catch(function() {});
              }

              window.location.reload();
            }

            // Fast path: compare embedded version with localStorage
            if (htmlVersion) {
              var storedVersion = localStorage.getItem(BUILD_VERSION_KEY);
              if (storedVersion && storedVersion !== htmlVersion) {
                console.warn('[Proactive] Build changed (local):', storedVersion, '->', htmlVersion);
                nuclearClear(htmlVersion);
                return;
              }
            }

            // Network path: poll server version.txt to detect stale HTML cache
            // Uses cache: 'no-store' to bypass browser HTTP cache
            fetch('/version.txt?_v=' + Date.now(), { cache: 'no-store' })
              .then(function(r) {
                if (!r.ok) return;
                return r.text();
              })
              .then(function(serverVersion) {
                if (!serverVersion) return;
                serverVersion = serverVersion.trim();
                var storedVersion = localStorage.getItem(BUILD_VERSION_KEY);

                // If server version differs from localStorage → new deploy detected
                if (storedVersion && storedVersion !== serverVersion) {
                  console.warn('[Proactive] Build changed (network):', storedVersion, '->', serverVersion);
                  nuclearClear(serverVersion);
                  return;
                }

                // If embedded version differs from server → HTML is stale (cached)
                if (htmlVersion && htmlVersion !== serverVersion) {
                  console.warn('[Proactive] HTML stale:', htmlVersion, 'vs server:', serverVersion);
                  nuclearClear(serverVersion);
                }
              })
              .catch(function() {
                // Network failed — no action (don't break page on network errors)
              });
          } catch(e) {
            // Silently fail — version check must not break the page
          }
        })();

        // === REACTIVE ASSET ERROR RECOVERY ===
        function triggerRecovery(reason) {
          console.warn('[Auto-Recovery]', reason, 'đang ép tải lại trang...');
          var lastReload = sessionStorage.getItem(RECOVERY_KEY);
          if (!lastReload || Date.now() - parseInt(lastReload) > COOLDOWN_MS) {
            sessionStorage.setItem(RECOVERY_KEY, Date.now().toString());
            var currentUrl = new URL(window.location.href);
            currentUrl.searchParams.set('reload_v', Date.now().toString());
            window.location.href = currentUrl.toString();
          }
        }

        function recoverStylesheet(link) {
          if (!link || link.dataset.assetRecovered === 'true') return;
          link.dataset.assetRecovered = 'true';
          try {
            const bustedUrl = new URL(link.href);
            bustedUrl.searchParams.set('asset_reload', Date.now().toString());

            const replacement = document.createElement('link');
            replacement.rel = 'stylesheet';
            replacement.crossOrigin = link.crossOrigin || 'anonymous';
            replacement.href = bustedUrl.toString();
            replacement.onload = function() {
              console.warn('[Auto-Recovery] CSS đã được nạp lại bằng URL chống cache.');
            };
            replacement.onerror = function() {
              triggerRecovery('CSS vẫn lỗi sau khi thử URL chống cache');
            };
            link.after(replacement);
          } catch (err) {
            console.warn('[Auto-Recovery] Không thể tự nạp lại CSS:', err);
          }
        }

        function clearLegacyBrowserCaches() {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              registrations.forEach(function(registration) {
                if (registration.scope && registration.scope.indexOf(window.location.origin) === 0) {
                  registration.unregister();
                }
              });
            }).catch(function() {});
          }

          if ('caches' in window) {
            caches.keys().then(function(keys) {
              keys.forEach(function(cacheKey) {
                if (/asset|vite|workbox|game|alin|resider/i.test(cacheKey)) {
                  caches.delete(cacheKey);
                }
              });
            }).catch(function() {});
          }
        }

        clearLegacyBrowserCaches();

        window.addEventListener('error', function(e) {
          if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
            const url = e.target.src || e.target.href;
            if (url && url.includes('/assets/')) {
              if (e.target.tagName === 'LINK' && e.target.rel === 'stylesheet') {
                recoverStylesheet(e.target);
              }
              triggerRecovery('Phát hiện asset cũ (error event)');
            }
          }
        }, true);

        // Vite specifically uses dynamic imports which throw unhandled rejections when chunks fail
        window.addEventListener('unhandledrejection', function(e) {
          const msg = e.reason && e.reason.message ? e.reason.message.toLowerCase() : '';
          if (msg.includes('failed to fetch dynamically imported module') || 
              msg.includes('importing a module script failed')) {
            triggerRecovery('Lỗi tải module động (unhandledrejection)');
          }
        });
        
        // Listen to Vite's custom preload error event (if used)
        window.addEventListener('vite:preloadError', function() {
          triggerRecovery('Lỗi preload chunk (vite:preloadError)');
        });
      })();
    </script>

    <div id="root"></div>
