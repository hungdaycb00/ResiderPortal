<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Alin.city</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          const url = e.target.src || e.target.href;
          if (url && url.includes('/assets/')) {
            console.warn('[Auto-Recovery] Phát hiện asset cũ hoặc lỗi kết nối, đang ép tải lại trang...');
            if (!sessionStorage.getItem('reloaded_once_asset')) {
              sessionStorage.setItem('reloaded_once_asset', 'true');
              window.location.reload(true);
            }
          }
        }
      }, true);
    </script>
